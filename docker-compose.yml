services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      mem0-api:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'EOF'
        server {
            listen 80;
            server_name _;

            client_max_body_size 10m;

            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;

            location / {
                proxy_pass http://mem0-api:8000;
                proxy_http_version 1.1;
            }
        }
        EOF
        exec nginx -g 'daemon off;'
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

  mem0-store:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    expose:
      - "6333"
    volumes:
      - mem0_oss_qdrant_data:/qdrant/storage

  mem0-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mem0-store:
        condition: service_started
    expose:
      - "8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      QDRANT_HOST: ${QDRANT_HOST:-mem0-store}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-mem0}
      HISTORY_DB_PATH: ${HISTORY_DB_PATH:-/app/history/history.db}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-nano-2025-04-14}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDER_PROVIDER: ${EMBEDDER_PROVIDER:-openai}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-text-embedding-3-small}
      EMBEDDER_API_KEY: ${EMBEDDER_API_KEY:-}
      MEM0_STARTUP_RETRIES: ${MEM0_STARTUP_RETRIES:-20}
      MEM0_STARTUP_DELAY_SECONDS: ${MEM0_STARTUP_DELAY_SECONDS:-3}
    volumes:
      - mem0_oss_history_data:/app/history
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

volumes:
  mem0_oss_qdrant_data:
  mem0_oss_history_data:
